<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect x="8" y="8" width="1008" height="1008" rx="220" ry="220" fill="none" stroke="#2d2d4a" stroke-width="4"/>

  <!-- Terminal window frame -->
  <rect x="160" y="200" width="704" height="560" rx="24" ry="24" fill="#0f0f1f" stroke="#3b3b5c" stroke-width="3"/>

  <!-- Title bar -->
  <rect x="160" y="200" width="704" height="56" rx="24" ry="24" fill="#1a1a30"/>
  <rect x="160" y="232" width="704" height="24" fill="#1a1a30"/>

  <!-- Traffic light dots -->
  <circle cx="200" cy="228" r="10" fill="#ff5f57"/>
  <circle cx="232" cy="228" r="10" fill="#febc2e"/>
  <circle cx="264" cy="228" r="10" fill="#28c840"/>

  <!-- Pi symbol (π) — large, centered -->
  <text x="512" y="560" text-anchor="middle" dominant-baseline="central"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="340" font-weight="bold" fill="url(#glow)">π</text>

  <!-- Cursor blink line -->
  <rect x="670" y="420" width="4" height="280" rx="2" fill="#6366f1" opacity="0.7"/>

  <!-- Bottom accent bar -->
  <rect x="200" y="720" width="200" height="4" rx="2" fill="url(#accent)" opacity="0.5"/>
</svg>
